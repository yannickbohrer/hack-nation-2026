services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./genome_firewall:/genome_firewall
    environment:
      - PYTHONPATH=/
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "8080:5173"
    environment:
      - VITE_API_URL=https://hack-nation-api.ybohrer.com
    depends_on:
      backend:
        condition: service_healthy
